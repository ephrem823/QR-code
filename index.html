<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sabom Tsiga - Fire International Taekwondo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 30px 16px; }
    .card { background: white; border-radius: 16px; max-width: 480px; width: 100%; padding: 32px 24px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .photo { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid #cc0000; margin-bottom: 16px; }
    h1 { font-size: 1.6rem; color: #1a1a2e; }
    .title { color: #cc0000; font-size: 1rem; margin: 6px 0 4px; }
    .org { color: #555; font-size: 0.9rem; font-weight: bold; margin-bottom: 20px; }
    .section { text-align: left; margin-top: 20px; }
    .section h2 { font-size: 0.85rem; text-transform: uppercase; color: #888; margin-bottom: 8px; letter-spacing: 1px; }
    .section p { color: #333; font-size: 0.95rem; line-height: 1.6; }
    video { width: 100%; border-radius: 10px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="card">

    <!-- PHOTO: replace with your image file name -->
    <img src="https://raw.githubusercontent.com/ephrem823/QR-code/main/photo.jpg" alt="Profile Photo" class="photo" />

    <!-- NAME & JOB TITLE -->
    <h1>Sabom Tsiga</h1>
    <p class="title">Taekwondo Instructor (Sabom)</p>
    <p class="org">🔥 Fire International Taekwondo</p>

    <!-- ABOUT / WORK -->
    <div class="section">
      <h2>About</h2>
      <p>Sabom Tsiga is a dedicated Taekwondo instructor at Fire International Taekwondo, committed to training students in discipline, respect, and the art of Taekwondo.</p>
    </div>

    <!-- VIDEO -->
    <div class="section">
      <h2>Video</h2>
      <!-- replace video.mp4 with your video file name -->
      <video controls>
        <source src="video.mp4" type="video/mp4" />
        Your browser does not support the video tag.
      </video>
    </div>

  </div>
</body>
</html>
